<!DOCTYPE html>
<html>
<head>
    <title>Edge Impulse ESP32 Controller</title>
    <script src="edge-impulse-standalone.js"></script> 
</head>
<body>
    <h2>AI Classifier & LCD Control</h2>
    <div id="camera-container"></div>
    <hr>
    <button id="addBtn" style="padding:20px">Add Item</button>
    <button id="removeBtn" style="padding:20px">Remove Last Item</button>
    <p>Status: <span id="status">Connecting...</span></p>

    <script>
        const gateway = `ws://192.168.1.XX/ws`; // Replace with your ESP32 IP
        let websocket = new WebSocket(gateway);
        
        // 1. Initialize the Classifier
        const classifier = new EdgeImpulseClassifier();
        
        async function startInference() {
            await classifier.init();
            
            // This loop mimics the Edge Impulse Mobile Client behavior
            setInterval(async () => {
                const results = await classifier.classify(); 
                // results = { result: { classification: { "ObjectA": 0.95, "ObjectB": 0.05 } } }
                
                if (results.result.classification["YourObject"] > 0.8) {
                    console.log("Object Detected!");
                    websocket.send("ADD"); // Auto-trigger ESP32
                }
            }, 500); // Check every 500ms
        }

        // 2. Manual Buttons
        document.getElementById('addBtn').onclick = () => websocket.send("ADD");
        document.getElementById('removeBtn').onclick = () => websocket.send("REMOVE");

        websocket.onopen = () => { document.getElementById('status').innerText = "Connected to ESP32"; };
    </script>
</body>
</html>
